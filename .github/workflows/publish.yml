name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.1, 0.2.0, 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 25
          registry-url: 'https://registry.npmjs.org'

      - run: vp check
      - run: vpr typecheck
      - run: vpr eslint
      - run: vp pack
      - run: vp build

      - name: Install Playwright Browsers
        run: vpx playwright install chromium firefox

      - run: vp test
        timeout-minutes: 4

      - name: Update version
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          vp env exec npm version ${{ inputs.version }}

      # https://docs.npmjs.com/trusted-publishers
      - name: Publish to npm
        run: vp env exec npm publish --tag latest

      - name: Push tag
        run: git push origin v${{ inputs.version }}

      - name: Create GitHub Release
        run: gh release create v${{ inputs.version }} --title "v${{ inputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
