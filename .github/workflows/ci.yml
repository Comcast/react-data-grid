name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 25

      - run: vp check
      - run: vpr typecheck
      - run: vpr eslint
      - run: vp pack
      - run: vp build

      - name: Install Playwright Browsers
        run: vpx playwright install chromium firefox

      - run: vp test
        timeout-minutes: 4

      - name: Upload test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts
          path: |
            test/**/__screenshots__/**
            test/**/__traces__/**
            .vitest-attachments/test/**
          if-no-files-found: ignore

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Deploy gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git fetch origin gh-pages
          git worktree add gh-pages gh-pages
          cd gh-pages
          git rm -r .
          mv ../dist/* .
          touch .nojekyll
          git add .
          git commit -m "gh-pages deployment" || echo "Nothing to commit"
          git push -f https://comcast:${{secrets.GITHUB_TOKEN}}@github.com/Comcast/react-data-grid.git
